version: "3.9"

services:
  api:
    build: .
    container_name: loan_wizard_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./loan_wizard.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - STT_PROVIDER=${STT_PROVIDER:-whisper}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - APP_ENV=production
    volumes:
      - ./loan_wizard.db:/app/loan_wizard.db
      - ./logs:/app/logs
    restart: unless-stopped

  # Optional: swap SQLite for Postgres in production
