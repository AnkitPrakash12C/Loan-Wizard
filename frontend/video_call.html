<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video KYC – Loan Wizard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1b2a;
      color: #e0eaf5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo { font-weight: 800; font-size: 1.2rem; }
    header .logo span { color: #f6c90e; }
    .step-pill {
      margin-left: auto;
      background: rgba(246,201,14,0.15);
      border: 1px solid #f6c90e44;
      color: #f6c90e;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .main {
      display: flex;
      flex: 1;
      gap: 20px;
      padding: 20px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Video panel ── */
    .video-panel {
      flex: 1.4;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .video-wrapper {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
    }
    #localVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror */
    }
    .overlay-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .rec-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff4444;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .ctrl-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-record  { background: #ff4444; color: #fff; }
    .btn-stop    { background: #444; color: #fff; }
    .btn-submit  { background: #f6c90e; color: #0d1b2a; }

    /* ── Info panel ── */
    .info-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 18px;
    }
    .card h3 {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7a9cbf;
      margin-bottom: 10px;
    }

    /* Transcript */
    #transcript {
      font-size: 0.88rem;
      line-height: 1.6;
      color: #c0d8f0;
      min-height: 80px;
      white-space: pre-wrap;
    }

    /* Fields table */
    .field-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.84rem;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .field-row:last-child { border-bottom: none; }
    .field-label { color: #7a9cbf; }
    .field-value { color: #f0f8ff; font-weight: 600; }

    /* Status log */
    #statusLog {
      font-size: 0.78rem;
      color: #7a9cbf;
      line-height: 2;
      max-height: 120px;
      overflow-y: auto;
    }
    .log-ok   { color: #4cde8c; }
    .log-warn { color: #f6c90e; }
    .log-err  { color: #ff7f7f; }

    .proceed-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #f6c90e, #e8a000);
      color: #0d1b2a;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: none;
    }
    .proceed-btn:hover { opacity: 0.9; }

    canvas { display: none; }
  </style>
</head>
<body>
<header>
  <div class="logo">Loan<span>Wizard</span></div>
  <span>Video KYC & Onboarding</span>
  <div class="step-pill">Step 2 of 3</div>
</header>

<div class="main">
  <!-- LEFT: Video -->
  <div class="video-panel">
    <div class="video-wrapper">
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="overlay-badge">
        <div class="rec-dot" id="recDot" style="display:none"></div>
        <span id="recLabel">Camera Ready</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn btn-record" id="btnRecord" onclick="startRecording()">
        ● Start Recording
      </button>
      <button class="ctrl-btn btn-stop" id="btnStop" onclick="stopRecording()" disabled>
        ■ Stop
      </button>
      <button class="ctrl-btn btn-submit" id="btnSubmit" onclick="submitAudio()" disabled>
        ↑ Submit Audio
      </button>
    </div>

    <canvas id="snapCanvas"></canvas>
  </div>

  <!-- RIGHT: Info -->
  <div class="info-panel">
    <div class="card">
      <h3>Live Transcript</h3>
      <div id="transcript">Waiting for recording…</div>
    </div>

    <div class="card">
      <h3>Extracted Information</h3>
      <div id="fields">
        <div class="field-row"><span class="field-label">Name</span><span class="field-value" id="f-name">—</span></div>
        <div class="field-row"><span class="field-label">Employment</span><span class="field-value" id="f-emp">—</span></div>
        <div class="field-row"><span class="field-label">Monthly Income</span><span class="field-value" id="f-income">—</span></div>
        <div class="field-row"><span class="field-label">Loan Purpose</span><span class="field-value" id="f-purpose">—</span></div>
        <div class="field-row"><span class="field-label">Requested Amount</span><span class="field-value" id="f-amount">—</span></div>
        <div class="field-row"><span class="field-label">Age (Declared)</span><span class="field-value" id="f-age">—</span></div>
        <div class="field-row"><span class="field-label">Age (Estimated)</span><span class="field-value" id="f-age-est">—</span></div>
        <div class="field-row"><span class="field-label">Consent</span><span class="field-value" id="f-consent">—</span></div>
      </div>
    </div>

    <div class="card">
      <h3>Processing Status</h3>
      <div id="statusLog">Waiting to start…</div>
    </div>

    <button class="proceed-btn" id="proceedBtn" onclick="proceedToOffer()">
      View Loan Offers →
    </button>
  </div>
</div>

<script>
  const SESSION_ID = new URLSearchParams(window.location.search).get('session');
  if (!SESSION_ID) window.location.href = '/';

  let stream, mediaRecorder, audioChunks = [];
  let frameInterval = null;

  // ── Camera setup ──────────────────────────────────────────────
  async function initCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('localVideo').srcObject = stream;
      log('Camera and microphone ready.', 'ok');
    } catch (e) {
      log('Camera access denied: ' + e.message, 'err');
    }
  }

  // ── Recording ─────────────────────────────────────────────────
  function startRecording() {
    if (!stream) return alert('Camera not ready');
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.start(1000);

    document.getElementById('btnRecord').disabled = true;
    document.getElementById('btnStop').disabled = false;
    document.getElementById('recDot').style.display = 'block';
    document.getElementById('recLabel').textContent = 'Recording…';
    document.getElementById('transcript').textContent = 'Recording in progress…';

    // Capture a frame every 5 s for age estimation
    frameInterval = setInterval(captureAndAnalyzeFrame, 5000);
    log('Recording started.', 'ok');
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    clearInterval(frameInterval);
    document.getElementById('btnStop').disabled = true;
    document.getElementById('btnSubmit').disabled = false;
    document.getElementById('recDot').style.display = 'none';
    document.getElementById('recLabel').textContent = 'Recording stopped';
    log('Recording stopped. Click Submit to process.', 'warn');
  }

  // ── Submit audio ───────────────────────────────────────────────
  async function submitAudio() {
    document.getElementById('btnSubmit').disabled = true;
    log('Uploading audio for transcription…', 'ok');

    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const form = new FormData();
    form.append('audio', blob, 'recording.webm');

    try {
      const resp = await fetch(`/api/stt/transcribe/${SESSION_ID}`, {
        method: 'POST', body: form,
      });
      const data = await resp.json();
      document.getElementById('transcript').textContent = data.transcript;
      fillFields(data.fields);
      log('Transcription complete. Running risk evaluation…', 'ok');

      await evaluateRisk();
    } catch (e) {
      log('Error processing audio: ' + e.message, 'err');
    }
  }

  // ── Fill extracted fields ──────────────────────────────────────
  function fillFields(f) {
    if (!f) return;
    const fmt = (v, prefix='') => v != null ? prefix + v : '—';
    document.getElementById('f-name').textContent     = fmt(f.full_name);
    document.getElementById('f-emp').textContent      = fmt(f.employment_type);
    document.getElementById('f-income').textContent   = f.monthly_income ? '₹' + f.monthly_income.toLocaleString('en-IN') : '—';
    document.getElementById('f-purpose').textContent  = fmt(f.loan_purpose);
    document.getElementById('f-amount').textContent   = f.requested_amount ? '₹' + f.requested_amount.toLocaleString('en-IN') : '—';
    document.getElementById('f-age').textContent      = fmt(f.declared_age);
    document.getElementById('f-consent').textContent  = f.verbal_consent ? '✅ Yes' : '❌ No';
  }

  // ── Frame capture for age estimation ──────────────────────────
  async function captureAndAnalyzeFrame() {
    const video = document.getElementById('localVideo');
    const canvas = document.getElementById('snapCanvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    canvas.toBlob(async blob => {
      if (!blob) return;
      const form = new FormData();
      form.append('frame', blob, 'frame.jpg');
      try {
        const resp = await fetch(`/api/vision/analyze-frame/${SESSION_ID}`, {
          method: 'POST', body: form,
        });
        const data = await resp.json();
        const age = data.vision?.estimated_age;
        if (age) {
          document.getElementById('f-age-est').textContent = age + ' yrs';
          const ok = data.age_validation?.ok;
          log(`Age estimation: ${age} yrs | Validation: ${ok ? '✅' : '⚠️'}`, ok ? 'ok' : 'warn');
        }
      } catch (_) {}
    }, 'image/jpeg', 0.8);
  }

  // ── Risk evaluation ────────────────────────────────────────────
  async function evaluateRisk() {
    try {
      const resp = await fetch(`/api/risk/evaluate/${SESSION_ID}`, { method: 'POST' });
      const data = await resp.json();
      log(`Risk score: ${data.risk_score} | Band: ${data.classification?.risk_band}`, 'ok');
      log('Generating loan offers…', 'ok');
      await generateOffers();
    } catch (e) {
      log('Risk evaluation error: ' + e.message, 'err');
    }
  }

  // ── Offer generation ──────────────────────────────────────────
  async function generateOffers() {
    try {
      const resp = await fetch(`/api/offer/generate/${SESSION_ID}`, { method: 'POST' });
      const data = await resp.json();
      if (data.eligible) {
        log(`✅ Eligible! ${data.offers.length} offer(s) generated.`, 'ok');
      } else {
        log('❌ Not eligible at this time.', 'warn');
      }
      document.getElementById('proceedBtn').style.display = 'block';
    } catch (e) {
      log('Offer generation error: ' + e.message, 'err');
    }
  }

  // ── Navigation ────────────────────────────────────────────────
  function proceedToOffer() {
    window.location.href = `/offer-result?session=${SESSION_ID}`;
  }

  // ── Logging ───────────────────────────────────────────────────
  function log(msg, type = '') {
    const el = document.getElementById('statusLog');
    const span = document.createElement('div');
    span.className = type ? `log-${type}` : '';
    span.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
  }

  // ── Init ──────────────────────────────────────────────────────
  initCamera();
</script>
</body>
</html>
