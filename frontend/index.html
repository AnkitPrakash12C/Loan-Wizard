<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Poonawalla Fincorp – Loan Wizard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
    .logo span { color: #f6c90e; }
    .subtitle { color: #aac4e0; margin: 8px 0 32px; font-size: 0.95rem; }
    label { display: block; text-align: left; font-size: 0.82rem; color: #aac4e0; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1rem;
      margin-bottom: 18px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #f6c90e; }
    input::placeholder { color: #6a8caa; }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #f6c90e, #e8a000);
      color: #0f2027;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .notice { font-size: 0.78rem; color: #7a9cbf; margin-top: 16px; }
    .error { color: #ff7f7f; font-size: 0.85rem; margin-top: -10px; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Loan<span>Wizard</span></div>
  <p class="subtitle">Poonawalla Fincorp – AI-Powered Video Onboarding</p>

  <div>
    <label>Mobile Number *</label>
    <input type="tel" id="phone" placeholder="10-digit mobile number" maxlength="10"/>

    <label>Email Address</label>
    <input type="email" id="email" placeholder="optional"/>

    <p class="error" id="err">Please enter a valid 10-digit mobile number.</p>

    <button class="btn" id="startBtn" onclick="startSession()">
      Start Video Onboarding →
    </button>
  </div>

  <p class="notice">
    🔒 Your data is encrypted and processed securely.<br/>
    By proceeding you consent to a video-recorded KYC session.
  </p>
</div>

<script>
  // Pre-fill phone if passed via query param (from SMS/WhatsApp campaign link)
  const params = new URLSearchParams(window.location.search);
  if (params.get('phone')) document.getElementById('phone').value = params.get('phone');
  if (params.get('email')) document.getElementById('email').value = params.get('email');

  async function startSession() {
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const errEl = document.getElementById('err');

    if (!/^\d{10}$/.test(phone)) {
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';

    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.textContent = 'Creating session…';

    // Grab geolocation
    let geo = {};
    try {
      const pos = await new Promise((res, rej) =>
        navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 })
      );
      geo = { geo_lat: pos.coords.latitude, geo_lng: pos.coords.longitude };
    } catch (_) {}

    try {
      const resp = await fetch('/api/session/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          customer_phone: phone,
          customer_email: email || null,
          campaign_id: params.get('campaign') || null,
          ip_address: null,
          device_info: navigator.userAgent,
          ...geo,
        }),
      });

      if (!resp.ok) throw new Error('Server error');
      const data = await resp.json();
      // Redirect to video call page with session ID
      window.location.href = `/call?session=${data.id}`;
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Start Video Onboarding →';
      alert('Failed to start session. Please try again.');
    }
  }
</script>
</body>
</html>
